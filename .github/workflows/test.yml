name: Test del Proyecto

on:
  push:
    branches:
      - main


jobs:
  test:
    runs-on: ubuntu-latest
    
    # Le indicamos a GitHub que corra todos los comandos dentro de tu carpeta
    defaults:
      run:
        working-directory: ./web_test # <-- REEMPLAZÁ "app" POR EL NOMBRE REAL DE TU CARPETA


    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4


      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Instalar dependencias
        run: npm install


      - name: Ejecutar test
        run: npm test
